rules:
  raw_files_are_immutable: true
  scoring_cannot_start_without_phase2_checks: true
  scoring_cannot_start_without_phase3_id_map: true
  scoring_cannot_start_without_phase4_surfaceome_universe: true
  scoring_cannot_start_without_phase4b_rank_resolution: true
  final_ranking_cannot_start_without_phase5_tumor_expression: true
  final_ranking_cannot_start_without_phase6_normal_selectivity_risk: true
  final_ranking_cannot_start_without_phase7_protein_evidence: true
  final_ranking_cannot_start_without_phase8_tme_gate: true
  final_ranking_cannot_start_without_phase9_topology_isoforms: true
  tumor_expression_score_is_component_not_final_ranking: true
  selectivity_and_risk_scores_are_components_not_final_ranking: true
  protein_evidence_score_is_component_not_final_ranking: true
  topology_score_is_component_not_final_ranking: true
  structure_not_in_numeric_score: true
  depmap_functional_not_in_numeric_score: true
  clinical_druggability_not_in_numeric_score: true
  single_cell_score_is_not_available_unless_scrna_gate_passes: true
  cldn18_2_and_fgfr2b_claims_blocked_without_isoform_evidence: true
  tme_bulk_correlations_are_flags_not_filters: true
  tme_purity_adjusted_correlations_are_flags_not_filters: true
  fase13_rankings_are_preliminary_not_final_tiers: true
  fase14_requires_phase13_sanity_diagnostic_review: true
  fase15_coarse_tiers_are_unordered: true
  fase15_curation_informs_tier_not_score: true
  wang2026_crosscheck_is_concordance_not_discovery_claim: true
  no_absolute_pathology_purity_claims_from_estimate_rnaseq_proxy: true
  gdc_adjacent_normal_sensitivity_required_before_strong_selectivity_claims: true
  no_lauren_quantitative_claims_without_exact_lauren_field: true
  no_purity_adjusted_claims_without_purity_source: true
  release_commit_recorded_by_git_history: true
