source_acquisition_policy:
  documentation: "docs/source_acquisition_policy.md"
  default_reviewer_claim: "frozen_local_raw_source_files_with_checksums_not_100_percent_live_redownload"
  final_archive_requirement: "fulfilled_by_zenodo_doi_10.5281_zenodo.20498705_for_frozen_data_package_v0.1.0-rc4"
  live_redownload_status: "best_effort_only_after_release_because_external_APIs_and_files_can_change"
  ci_boundary:
    push_pr: "syntax_lint_pytest_ci_safe_snakemake_dry_run_docker_build"
    manual_release_audit: "full_reviewer_audit_and_container_audit_when_frozen_data_bundle_is_present"
    manual_frozen_raw_rerun: "delete_derived_outputs_and_recompute_fase1_to_fase17_from_data_raw_when_data_bundle_is_present"
  frozen_api_or_manual_captures:
    - source_id: "cbioportal_stad_tcga"
      policy: "frozen_archived_input_not_default_live_download"
      checksum_manifest: "data/checksums/cbioportal_sha256.tsv"
      files:
        - "data/raw/cbioportal/stad_tcga_pan_can_atlas_2018_patient_clinical_data.json"
        - "data/raw/cbioportal/stad_tcga_pan_can_atlas_2018_gistic_erbb2_fgfr2_met.json"
      workflow_status: "Snakemake declares these files as inputs and runs scripts/build_tumor_expression.py --offline"
    - source_id: "gdc_tcga_stad"
      policy: "frozen_metadata_capture"
      checksum_manifest: "data/checksums/gdc_tcga_stad_sha256.tsv"
    - source_id: "scrna_gastric_candidates"
      policy: "frozen_candidate_context_input_not_numeric_score"
      checksum_manifest: "data/checksums/tisch2_candidate_scrna_sha256.tsv"
