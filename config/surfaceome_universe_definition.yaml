version: "0.2.0-phase4"
created: "2026-05-28"
status: "definition_executed_before_ranking"

objective: "Build a high-confidence but not overly narrow universe of candidate cell-surface proteins for gastric adenocarcinoma target prioritization."

candidate_sources:
  - id: "cancer_surfaceome_atlas"
    planned_use: "strong supporting source"
    status: "downloaded_used"
  - id: "cell_surface_protein_atlas_cspa"
    planned_use: "experimental cell-surface evidence"
    status: "downloaded_used"
  - id: "surfy"
    planned_use: "in silico surfaceome support"
    status: "downloaded_used"
  - id: "uniprot_topology"
    planned_use: "reviewed topology and extracellular regions"
    status: "downloaded_used"
  - id: "go_cell_surface_plasma_membrane"
    planned_use: "supporting annotation"
    status: "downloaded_used"
  - id: "hpa_subcellular_location"
    planned_use: "supporting localization"
    status: "downloaded_used"

initial_category_rules:
  core_surfaceome:
    description: "Multiple independent sources or curated topology strongly support cell-surface accessibility."
    minimum_evidence: "score >=6, >=3 support sources, strong curated/experimental or UniProt extracellular topology evidence, and an anchor/topology/localization signal, without secreted-only or intracellular-only conflict"
  probable_surfaceome:
    description: "Likely cell-surface proteins with multi-source support but lower confidence than core."
    minimum_evidence: "score >=5, >=4 support sources, strong curated/experimental or UniProt extracellular topology evidence, and an anchor/topology/localization signal, without secreted-only or intracellular-only conflict"
  ambiguous_membrane_or_surface_context:
    description: "Some surface evidence but incomplete or conflicting support."
    minimum_evidence: "single-source support, topology/signal evidence without enough independent support, or conflicting context requiring candidate-level review"
  excluded_or_flagged:
    description: "Known intracellular, secreted-only, mitochondrial, nuclear, ER-only, or TME/off-tumor markers unless context-specific surface evidence exists."

expected_size_range:
  min_genes: 500
  max_genes: 3000
  action_if_outside_range: "warn_and_document_in_design_decisions_before_scoring"

special_cases:
  cldn18:
    requirement: "Track CLDN18.2 isoform explicitly; gene-level CLDN18 is not enough for clinical claims."
  fgfr2:
    requirement: "Track FGFR2b isoform context explicitly when available."
  ptprc_pecam1:
    requirement: "Do not use as non-surface controls; use as TME/off-tumor penalty controls."
