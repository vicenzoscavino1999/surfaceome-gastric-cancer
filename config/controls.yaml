version: "0.1.0-preregistered"
created: "2026-05-28"
status: "frozen_before_data_execution"

positive_controls:
  - gene: "ERBB2"
    alias: "HER2"
    expected: "top_50_in_balanced_or_documented_biological_exception"
    rationale: "Clinically validated gastric/GEJ adenocarcinoma target."
  - gene: "CLDN18"
    alias: "CLDN18.2"
    expected: "top_100_in_balanced_and_isoform_flag_present"
    rationale: "CLDN18.2 is clinically validated; gene-level RNA is insufficient without isoform handling."
  - gene: "FGFR2"
    alias: "FGFR2b"
    expected: "top_100_or_subtype_amplification_flag"
    rationale: "Relevant gastric cancer target; isoform and amplification context matter."
  - gene: "TACSTD2"
    alias: "TROP2"
    expected: "ranked_with_normal_risk_flag"
    rationale: "ADC-relevant epithelial surface antigen with normal tissue risk."
  - gene: "EPCAM"
    expected: "surface_evidence_positive_with_normal_expression_penalty"
    rationale: "Strong epithelial surface antigen; safety/selectivity may reduce final tier."
  - gene: "CEACAM5"
    expected: "surface_evidence_positive_with_specificity_review"
    rationale: "Classical tumor antigen with variable specificity."
  - gene: "MET"
    expected: "ranked_or_flagged_for_heterogeneity"
    rationale: "Targetable receptor with heterogeneity/amplification context."
  - gene: "MSLN"
    expected: "surface_evidence_positive_or_documented_coverage_gap"
    rationale: "Surface antigen with therapeutic programs in other tumors."

secondary_benchmark_targets:
  - gene: "CEACAM6"
    expected: "surface_evidence_positive_with_specificity_review"
    rationale: "GI/epithelial antigen related to ADC and antibody target literature; useful benchmark but not a core positive control."
  - gene: "ERBB3"
    alias: "HER3"
    expected: "ranked_or_documented_if_low_in_STAD"
    rationale: "Known ADC-relevant receptor family member in gastric/GEJ therapeutic literature."
  - gene: "GUCY2C"
    expected: "surface_evidence_positive_with_gi_normal_expression_flag"
    rationale: "GI lineage surface target; useful for testing normal GI penalty behavior."
  - gene: "SLC44A4"
    expected: "topology_and_ecd_review_required"
    rationale: "Reported antibody/ADC-relevant surface antigen with substantial extracellular region."
  - gene: "NECTIN4"
    expected: "ranked_or_documented_if_expression_low_or_risk_high"
    rationale: "Established ADC target in other cancers and discussed in gastric ADC context."

negative_controls_intracellular_or_secreted:
  - gene: "ACTB"
    expected: "not_top_100_and_not_surfaceome_core"
    rationale: "Housekeeping intracellular protein."
  - gene: "GAPDH"
    expected: "not_top_100_and_not_surfaceome_core"
    rationale: "Housekeeping intracellular protein."
  - gene: "H3C1"
    expected: "not_top_100_and_not_surfaceome_core"
    rationale: "Nuclear histone control."
  - gene: "TOMM20"
    expected: "not_top_100_and_not_surfaceome_core"
    rationale: "Mitochondrial marker."
  - gene: "CALR"
    expected: "not_tier_1_without_context_specific_surface_evidence"
    rationale: "ER/luminal protein; surface exposure is context-specific."
  - gene: "ALB"
    expected: "not_top_100_and_not_cell_surface_target"
    rationale: "Secreted/plasma protein, not a tumor cell-surface target."

tme_or_off_tumor_penalty_controls:
  - gene: "PTPRC"
    alias: "CD45"
    expected: "surface_evidence_allowed_but_not_tier_1_for_epithelial_tumor_targeting"
    rationale: "Leukocyte surface marker; should be penalized as immune/TME signal, not as non-surface."
  - gene: "PECAM1"
    alias: "CD31"
    expected: "surface_evidence_allowed_but_not_tier_1_for_epithelial_tumor_targeting"
    rationale: "Endothelial marker; vascular/off-tumor risk control."

control_failure_protocol:
  rule: "A control failure triggers diagnosis, not ad-hoc score tuning."
  steps:
    - "Verify gene is present in the surfaceome universe and expression data."
    - "Verify HGNC/Ensembl/UniProt mapping and alias collisions."
    - "Classify as scoring bug, wrong expectation, known limitation, or ambiguous."
    - "If technical, fix and rerun downstream workflow."
    - "If biological, document without changing weights to force recovery."
